services:
  - type: web
    name: foretagsboende
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CONTACT_EMAIL
        value: kontakt@bostadsuthyrning.se
      - key: LEAD_EMAIL
        value: kontakt@bostadsuthyrning.se
